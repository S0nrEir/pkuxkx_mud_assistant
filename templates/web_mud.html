<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUD Web Client</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
<link rel="stylesheet" href="/static/css/web_mud.css">

</head>
<body>
<div class="app-shell">
    <div class="top-tabs">
        <div class="tab-buttons">
            <button class="tab-btn active" data-page="gamePage">游戏</button>
            <button class="tab-btn" id="btnTriggers" data-page="triggerPage">触发器</button>
        </div>
        <div class="toolbar-trigger-current">当前触发器：<span id="toolbarTriggerCurrentName">无</span></div>
        <button class="toolbar-btn danger" id="btnQuit">退出游戏</button>
    </div>

    <div class="page active" id="gamePage">
        <div class="container">
    <div class="left-panel">
            <div class="settings-header">设置</div>
            <div class="settings-body" id="settingsPanel">
                <div class="setting-group">
                    <div class="setting-group-title">终端消息屏蔽</div>
                    <div class="setting-row"><input type="checkbox" id="mute_chat" data-ch="chat"><label for="mute_chat">闲聊 <span class="ch-hint">chat</span></label></div>
                    <div class="setting-row"><input type="checkbox" id="mute_rumor" data-ch="rumor"><label for="mute_rumor">谣言 <span class="ch-hint">rumor</span></label></div>
                    <div class="setting-row"><input type="checkbox" id="mute_jy" data-ch="jy"><label for="mute_jy">交易 <span class="ch-hint">jy</span></label></div>
                    <div class="setting-row"><input type="checkbox" id="mute_qq" data-ch="qq"><label for="mute_qq">QQ群 <span class="ch-hint">qq</span></label></div>
                    <div class="setting-row"><input type="checkbox" id="mute_group" data-ch="group"><label for="mute_group">帮派 <span class="ch-hint">group</span></label></div>
                    <div class="setting-row"><input type="checkbox" id="mute_team" data-ch="team"><label for="mute_team">组队</label></div>
                    <div class="setting-row"><input type="checkbox" id="mute_shout" data-ch="shout"><label for="mute_shout">大喊 <span class="ch-hint">shout</span></label></div>
                </div>
            </div>
            <div class="settings-footer">屏蔽后终端不显示，聊天面板始终显示</div>
            <div class="map-panel">
                <div class="panel-label" id="mapLabel">地图</div>
                <div id="mapTerminal"></div>
            </div>
    </div>
            <div class="center-area">
        <div class="terminal-panel">
            <div class="header">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">未连接</span>
            </div>
            <div id="terminal">
                <button class="scroll-bottom-btn" id="scrollBottomBtn" title="回到底部">⌄</button>
            </div>
        </div>
    <div class="bottom-panel">
        <div class="input-bar">
            <input type="text" id="cmdInput" placeholder="输入命令..." autocomplete="off" autofocus>
            <button class="send-btn" id="sendBtn">发送</button>
        </div>
    </div>
    </div>
    <div class="side-panel">
        <div class="panel-section history-section">
            <div class="panel-header">命令历史</div>
            <div class="panel-body" id="cmdHistory">
                <div class="empty-hint">暂无命令</div>
            </div>
        </div>
        <div class="panel-section chat-section">
            <div class="panel-header">聊天频道</div>
            <div class="panel-body" id="chatPanel">
                <div class="empty-hint">等待聊天消息...</div>
            </div>
        </div>
    </div>
        </div>
    </div>

    <div class="page" id="triggerPage">
        <div class="trigger-panel" id="triggerPanel">
            <div class="trigger-main">
                <div class="trigger-current">当前加载：<span id="triggerCurrentName">无</span></div>
                <div class="trigger-detail" id="triggerDetail">选择一个触发器查看详情</div>
                <div class="trigger-actions trigger-main-actions">
                    <button class="trigger-small-btn primary" id="triggerLoadBtn" disabled>加载</button>
                    <button class="trigger-small-btn" id="triggerNewBtn">新建</button>
                    <button class="trigger-small-btn" id="triggerCopyBtn" disabled>复制</button>
                    <button class="trigger-small-btn" id="triggerAddRuleBtn">添加分支</button>
                    <button class="trigger-small-btn primary" id="triggerSaveBtn">保存</button>
                    <button class="trigger-small-btn" id="triggerStopBtn">停用</button>
                    <button class="trigger-small-btn danger" id="triggerDeleteBtn" disabled>删除</button>
                </div>
                <div class="trigger-status" id="triggerStatus">未加载触发器</div>
                <div class="trigger-editor">
                    <div class="trigger-field">
                        <label for="triggerName">触发器名称</label>
                        <input type="text" id="triggerName" placeholder="例如：读书恢复">
                    </div>
                    <div class="trigger-field">
                        <label for="triggerNotes">备注</label>
                        <textarea id="triggerNotes" placeholder="可写用途、地点或注意事项"></textarea>
                    </div>
                    <div class="trigger-field">
                        <label>分支规则：服务器消息关键词 → 发送指令</label>
                        <div class="trigger-tip">延时秒不填默认 0；不能填写负数。</div>
                        <div id="triggerRules"></div>
                    </div>
                </div>
            </div>
            <div class="trigger-browser">
                <div class="trigger-current">所有触发器</div>
                <div class="trigger-list" id="triggerList">
                    <div class="empty-hint">暂无触发器</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="fullme-panel" id="fullmePanel" aria-hidden="true">
    <div class="fullme-card">
        <div class="fullme-header">
            <div>
                <div class="fullme-title">工号 / 验证码</div>
                <div class="fullme-source" id="fullmeSource">等待图片</div>
            </div>
            <button class="fullme-close" id="fullmeCloseBtn" type="button" title="关闭">×</button>
        </div>
        <div class="fullme-image-wrap">
            <img id="fullmeImage" alt="工号验证码图片">
        </div>
        <div class="fullme-form">
            <select id="fullmeCommandMode" title="发送命令类型">
                <option value="report">report</option>
                <option value="fullme">fullme</option>
            </select>
            <input type="text" id="fullmeInput" placeholder="手动输入看到的内容" autocomplete="off">
            <button class="fullme-submit" id="fullmeSubmitBtn" type="button">发送</button>
        </div>
        <div class="fullme-actions">
            <button class="fullme-secondary" id="fullmeCopyUrlBtn" type="button">复制链接</button>
            <button class="fullme-secondary" id="fullmeOpenUrlBtn" type="button">浏览器打开</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
<script src="/static/js/web_mud.js"></script>

</body>
</html>
